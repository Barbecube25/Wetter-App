<!DOCTYPE html>
<html>
<head><title>Moon Phase Test</title></head>
<body style="background:#1a2744; display:flex; flex-wrap:wrap; gap:20px; padding:20px;">

<script>
const getMoonPhaseSVGPath = (phase, r = 12) => {
  const isWaning = phase > 4;
  const waxPhase = isWaning ? 8 - phase : phase;
  const kx = Math.cos(waxPhase * Math.PI / 4);
  const termRx = Math.abs(kx) * r;
  const outerSweep = isWaning ? 0 : 1;
  const termSweep = kx < 0 ? 1 - outerSweep : outerSweep;
  if (waxPhase === 2) {
    return `M 0,${-r} A ${r},${r} 0 0,${outerSweep} 0,${r} L 0,${-r}`;
  }
  return `M 0,${-r} A ${r},${r} 0 0,${outerSweep} 0,${r} A ${termRx},${r} 0 0,${termSweep} 0,${-r}`;
};

const labels = ['0: New Moon', '1: Waxing Crescent', '2: First Quarter', '3: Waxing Gibbous', '4: Full Moon', '5: Waning Gibbous', '6: Last Quarter', '7: Waning Crescent'];

for (let phase = 0; phase < 8; phase++) {
  const div = document.createElement('div');
  div.style.textAlign = 'center';
  div.style.color = 'white';
  div.style.fontFamily = 'Arial';
  
  let moonSVG = '';
  if (phase === 4) {
    moonSVG = `<circle r="12" fill="white" opacity="0.9"/>`;
  } else if (phase !== 0) {
    moonSVG = `<path d="${getMoonPhaseSVGPath(phase, 12)}" fill="white" opacity="0.9"/>`;
    console.log(`Phase ${phase}: ${getMoonPhaseSVGPath(phase, 12)}`);
  }
  
  div.innerHTML = `
    <p>${labels[phase]}</p>
    <svg width="100" height="100" viewBox="-20 -20 40 40" style="background:#0a0a2a; border-radius:50%;">
      <circle r="12" fill="#1a2744"/>
      ${moonSVG}
    </svg>
  `;
  document.body.appendChild(div);
}
</script>
</body>
</html>
